name: plagiarism-checker-ai-mcp
description: Check text similarity, analyze writing style consistency, verify citations,
  and generate originality
version: 1.0.0
tools:
- name: check_text_similarity
  description: Compare two texts for similarity using multiple algorithms.
  parameters:
  - name: text_a
    type: string
    required: true
  - name: text_b
    type: string
    required: true
- name: analyze_writing_style
  description: Detect writing style characteristics and inconsistencies. Optionally
    compare against a reference text.
  parameters:
  - name: text
    type: string
    required: true
  - name: reference_text
    type: string
    required: false
- name: check_citation_completeness
  description: 'Verify that citations and references are properly formatted and complete.
    Styles: apa, harvard, ieee, any.'
  parameters:
  - name: text
    type: string
    required: true
  - name: expected_citation_style
    type: string
    required: false
- name: generate_originality_report
  description: Generate a full originality analysis report. Pass reference_texts as
    JSON array of strings.
  parameters:
  - name: text
    type: string
    required: true
  - name: reference_texts
    type: string
    required: false
  - name: author_name
    type: string
    required: false
